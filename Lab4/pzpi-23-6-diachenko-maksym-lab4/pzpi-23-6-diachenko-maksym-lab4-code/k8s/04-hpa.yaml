apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nra-api-hpa
  namespace: natural-resources
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nra-api
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
