version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ecoresource_postgres
    environment:
      POSTGRES_DB: ecoresource
      POSTGRES_USER: ecoresource
      POSTGRES_PASSWORD: ecoresource
    ports:
      - "5432:5432"
    volumes:
      - ecoresource_pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ecoresource_api
    depends_on:
      - db
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: dev-secret-change-me
      DATABASE_URL: postgres://ecoresource:ecoresource@db:5432/ecoresource
    ports:
      - "3000:3000"

  web:
    image: nginx:1.27-alpine
    container_name: ecoresource_web
    depends_on:
      - server
    volumes:
      - ./web_client:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

volumes:
  ecoresource_pgdata:
