apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ecoresource-api-hpa
  namespace: ecoresource
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ecoresource-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
