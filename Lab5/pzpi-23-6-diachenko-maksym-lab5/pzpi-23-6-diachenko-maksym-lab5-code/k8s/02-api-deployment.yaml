apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecoresource-api
  namespace: ecoresource
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecoresource-api
  template:
    metadata:
      labels:
        app: ecoresource-api
    spec:
      containers:
        - name: api
          image: ecoresource-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ecoresource-secrets
                  key: database-url
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
